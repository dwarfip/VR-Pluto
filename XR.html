<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pluto XR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

  <!-- HUB -->
<a-assets>
  <!-- Ganti nanti pakai gambar kamu -->
  <img id="img1" src="yt.png">
  <img id="img2" src="plutoxrio.png">
  <img id="img3" src="net.png">
  <img id="img4" src="https://picsum.photos/id/1020/400/300">
  <img id="img5" src="https://picsum.photos/id/1024/400/300">
  <img id="img6" src="https://picsum.photos/id/1025/400/300">
  <img id="img7" src="https://picsum.photos/id/1035/400/300">
  <img id="img8" src="https://picsum.photos/id/1039/400/300">
  <img id="skyimg" src="white.jpeg">
</a-assets>

<a-sky src="white.jpeg"></a-sky>

<a-entity position="0 1.6 -6">

  <!-- ===== ATAS (3 BESAR) ===== -->

<!-- ===== ATAS (3 BESAR - LEBIH LEGA) ===== -->

<a-plane class="card"
         position="-2.4 1.5 0"
         rotation="0 22 0"
         width="2" height="1.2"
         material="src: #img1; transparent: true">
</a-plane>

<a-plane class="card"
         id="plutoPanel"
         position="0 1.3 0.35"
         width="2.2" height="1.3"
         material="src: #img2; transparent: true">
</a-plane>

<a-plane class="card"
         position="2.4 1.5 0"
         rotation="0 -22 0"
         width="2" height="1.2"
         material="src: #img3; transparent: true">
</a-plane>


  <!-- ===== BAWAH (5 KECIL) ===== -->

  <a-plane class="card"
           position="-3.2 -0.5 0"
           rotation="0 28 0"
           width="1.3" height="0.8"
           material="src: #img4">
  </a-plane>

  <a-plane class="card"
           position="-1.6 -0.5 0"
           rotation="0 12 0"
           width="1.3" height="0.8"
           material="src: #img5">
  </a-plane>

  <a-plane class="card"
           position="0 -0.5 0.2"
           width="1.4" height="0.9"
           material="src: #img6">
  </a-plane>

  <a-plane class="card"
           position="1.6 -0.5 0"
           rotation="0 -12 0"
           width="1.3" height="0.8"
           material="src: #img7">
  </a-plane>

  <a-plane class="card"
           position="3.2 -0.5 0"
           rotation="0 -28 0"
           width="1.3" height="0.8"
           material="src: #img8">
  </a-plane>

</a-entity>

  <!-- CAMERA -->
  <a-camera>
  <a-cursor 
    fuse="true" 
    fuse-timeout="1200"
    geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
    material="color: cyan; shader: flat">
  </a-cursor>
</a-camera>

</a-scene>

<script>
const cards = document.querySelectorAll(".card");

document.querySelector("#plutoPanel").addEventListener("click", () => {
  window.location.href = "pluto.html";
});

cards.forEach((card, index) => {

  card.addEventListener("mouseenter", () => {
    card.setAttribute("scale", "1.1 1.1 1");
  });

  card.addEventListener("mouseleave", () => {
    card.setAttribute("scale", "1 1 1");
  });

  card.addEventListener("click", () => {
    alert("Klik panel ke-" + (index+1) + " 🎯");
  });

});
</script>


</body>
</html>
