<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pluto XR - Pass Through</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>

<a-scene fog="type: exponential; color: #111; density: 0.01">

  <!-- ===== ASSETS ===== -->
  <a-assets>
    <video id="cam" autoplay playsinline></video>
  </a-assets>

  <!-- ===== SKY ===== -->
  <a-sky src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg"></a-sky>

  <!-- ===== LIGHT ===== -->
  <a-light type="ambient" intensity="0.7"></a-light>

  <!-- ===== PASS THROUGH PANEL ===== -->

  <!-- Frame (biar keliatan kayak window) -->
  <a-plane 
    position="0 1.6 -3.05"
    width="1.8"
    height="1.2"
    color="#111"
    opacity="0.4">
  </a-plane>

  <!-- Kamera Panel -->
  <a-plane 
    id="camPanel"
    class="card"
    position="0 1.6 -3"
    width="1.6"
    height="1"
    material="src: #cam; shader: flat">
  </a-plane>

  <!-- ===== UI TAMBAHAN (OPSIONAL) ===== -->

  <a-plane class="card"
           position="-2 1.4 -3"
           width="1"
           height="0.6"
           color="#222">
  </a-plane>

  <a-plane class="card"
           position="2 1.4 -3"
           width="1"
           height="0.6"
           color="#222">
  </a-plane>

  <!-- ===== CAMERA ===== -->
  <a-camera>
    <a-cursor 
      fuse="true" 
      fuse-timeout="1200"
      geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02"
      material="color: cyan; shader: flat">
    </a-cursor>
  </a-camera>

</a-scene>

<!-- ===== SCRIPT ===== -->
<script>
window.addEventListener("load", () => {

  const video = document.querySelector("#cam");

  // 🎥 AKTIFKAN KAMERA DEPAN
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  })
  .then(stream => {
    video.srcObject = stream;
    video.play();
  })
  .catch(err => {
    console.log("Kamera error:", err);
    alert("Kamera tidak bisa diakses 😅");
  });

  // ✨ HOVER EFFECT
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {

    card.addEventListener("mouseenter", () => {
      card.setAttribute("scale", "1.08 1.08 1");
    });

    card.addEventListener("mouseleave", () => {
      card.setAttribute("scale", "1 1 1");
    });

  });

});
</script>

</body>
</html>
