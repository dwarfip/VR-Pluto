<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pluto XR - Camera Fix</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

  <!-- ASSETS -->
  <a-assets>
    <video id="cam" autoplay playsinline muted></video>
  </a-assets>

  <!-- SKY -->
  <a-sky color="#000"></a-sky>

  <!-- PANEL KAMERA -->
  <a-plane id="camPanel"
           position="0 1.6 -3"
           width="1.6"
           height="1"
           material="src: #cam; shader: flat; side: double">
  </a-plane>

  <!-- CAMERA -->
  <a-camera>
    <a-cursor fuse="true"></a-cursor>
  </a-camera>

</a-scene>

<script>
window.addEventListener("load", async () => {

  const video = document.getElementById("cam");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true, // 🔥 jangan pakai facingMode dulu
      audio: false
    });

    video.srcObject = stream;

    await video.play();

    console.log("Kamera sukses nyala ✅");

  } catch (e) {
    console.error("ERROR:", e);
    alert("Kamera gagal 😢: " + e.message);
  }

});
</script>

</body>
</html>
