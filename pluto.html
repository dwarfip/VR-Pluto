<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pluto XR - Camera Fix</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

  <!-- ASSETS -->
  <a-assets>
    <video id="cam" autoplay playsinline muted></video>
  </a-assets>

  <!-- SKY -->
  <a-sky color="#000"></a-sky>

  <!-- PANEL KAMERA -->
  <a-plane 
  id="camPanel"
  position="0 1.6 -3"
  width="1.6"
  height="1"
  material="shader: flat; src: #cam; side: double; transparent: true">
  </a-plane>

  <!-- CAMERA -->
  <a-camera>
    <a-cursor fuse="true"></a-cursor>
  </a-camera>

</a-scene>

<script>
window.addEventListener("load", async () => {

  const video = document.querySelector("#cam");
  const panel = document.querySelector("#camPanel");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();

      // 🔥 FORCE UPDATE TEXTURE
      panel.setAttribute("material", "src", "#cam");

      console.log("Video tampil ✅");
    };

  } catch (err) {
    console.log("Error:", err);
    alert("Kamera gagal 😅");
  }

});
</script>

</body>
</html>
